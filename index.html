<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Enhle 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #fff5f3; --warm: #fde8e8; --blush: #f4d5c8;
  --rose: #e87c9e; --deep: #a64d6f; --ink: #2a1a16;
  --gold: #e8a7c4; --gold-light: #f0c4dd;
}
html { scroll-behavior: smooth; }
body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* CURSOR */
.cursor { position: fixed; width: 8px; height: 8px; background: var(--rose); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
.cursor-ring { position: fixed; width: 28px; height: 28px; border: 1.5px solid var(--rose); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); opacity: 0.5; }
.cursor-petal { position: fixed; pointer-events: none; z-index: 9997; font-size: 0.9rem; transform: translate(-50%,-50%); opacity: 0; }

/* MUSIC PLAYER */
#music-player { position: fixed; bottom: 2rem; right: 2rem; z-index: 800; display: flex; align-items: center; gap: 0.6rem; background: var(--deep); color: var(--cream); padding: 0.8rem 1.2rem; border-radius: 50px; opacity: 0.3; transition: opacity 0.3s; box-shadow: 0 8px 24px rgba(166,77,111,0.15); }
#music-player.visible { opacity: 0.9; }
#music-player:hover { opacity: 1; }
.music-dot { width: 4px; height: 14px; border-radius: 2px; background: var(--gold); animation: musicPulse 1.2s ease-in-out infinite; }
.music-dot:nth-child(2){animation-delay:0.15s;} .music-dot:nth-child(3){animation-delay:0.3s;} .music-dot:nth-child(4){animation-delay:0.45s;}
@keyframes musicPulse { 0%,100%{transform:scaleY(0.4);opacity:0.4;} 50%{transform:scaleY(1);opacity:1;} }
.music-info { display: flex; flex-direction: column; }
.music-title { font-size: 0.7rem; color: var(--cream); letter-spacing: 0.05em; }
.music-artist { font-size: 0.6rem; color: var(--gold); letter-spacing: 0.08em; opacity: 0.8; }

/* STARFIELD */
#starfield { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.star { position: absolute; border-radius: 50%; background: white; animation: twinkle linear infinite; }
@keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.8;} }

/* INTRO */
#intro { position: fixed; inset: 0; background: var(--ink); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 1.5rem; transition: opacity 0.8s ease; opacity: 1; visibility: visible; }
#intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.intro-text { font-family: 'Cormorant Garamond', serif; color: var(--gold-light); font-size: clamp(1rem,2.5vw,1.3rem); letter-spacing: 0.3em; text-transform: uppercase; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
.intro-name { font-family: 'Playfair Display', serif; font-style: italic; color: var(--cream); font-size: clamp(2.5rem,8vw,5rem); opacity: 0; animation: fadeUp 1s ease 1s forwards; }
.intro-btn { margin-top: 1rem; padding: 1rem 2.8rem; border: none; background: var(--gold); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 50px; font-weight: 600; box-shadow: 0 8px 24px rgba(232,167,196,0.3); }
.intro-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(232,167,196,0.4); }

main { opacity: 0; transition: opacity 0.8s ease 0.2s; }
main.visible { opacity: 1; }

/* HERO */
#hero { min-height: 100vh; display: grid; place-items: center; padding: 4rem 2rem; position: relative; overflow: hidden; background: linear-gradient(135deg, var(--cream) 0%, var(--warm) 100%); }
.hero-bg-circle { position: absolute; border-radius: 50%; pointer-events: none; }
.hbc1 { width: 600px; height: 600px; background: radial-gradient(circle,rgba(232,124,158,0.15) 0%,transparent 70%); top:-100px; right:-100px; animation: drift 8s ease-in-out infinite alternate; }
.hbc2 { width: 400px; height: 400px; background: radial-gradient(circle,rgba(232,167,196,0.1) 0%,transparent 70%); bottom:-50px; left:-80px; animation: drift 10s ease-in-out infinite alternate-reverse; }
.hero-inner { text-align: center; max-width: 700px; position: relative; }
.hero-eyebrow { font-size: 0.75rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--rose); margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem,12vw,7rem); font-weight: 300; line-height: 0.95; color: var(--ink); margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards; }
.hero-title em { font-style: italic; color: var(--rose); display: block; }
.hero-divider { width: 60px; height: 1.5px; background: var(--rose); margin: 2rem auto; opacity: 0; animation: expandWidth 0.8s ease 0.9s forwards; border-radius: 10px; }
.hero-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.1rem,3vw,1.5rem); color: var(--deep); line-height: 1.7; opacity: 0; animation: fadeUp 0.9s ease 1s forwards; }
.scroll-hint { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0; animation: fadeUp 1s ease 1.2s forwards; }
.scroll-hint span { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--blush); }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom,var(--blush),transparent); animation: scrollPulse 2s ease-in-out infinite; }

/* SECTIONS */
.section { padding: clamp(4rem,10vw,8rem) clamp(1.5rem,6vw,6rem); max-width: 1100px; margin: 0 auto; }
.section-label { font-size: 0.7rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--rose); margin-bottom: 3rem; display: flex; align-items: center; gap: 1rem; font-weight: 600; }
.section-label::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right,var(--rose),transparent); border-radius: 10px; }

/* UNIQUE LETTER SECTION */
#letter { background: linear-gradient(135deg, var(--warm) 0%, var(--blush) 100%); padding: clamp(4rem,10vw,8rem) clamp(1.5rem,6vw,6rem); }
.letter-inner { max-width: 700px; margin: 0 auto; }
.letter-inner .section-label { color: var(--rose); }
.letter-paper { background: white; border: none; border-radius: 45px; padding: 3.5rem 4rem; position: relative; box-shadow: 0 12px 48px rgba(166,77,111,0.12); overflow: hidden; }
.letter-paper::before { content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(232,124,158,0.08) 0%, transparent 70%); border-radius: 50%; }
.letter-paper::after { content: ''; position: absolute; bottom: -30%; left: -5%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(232,167,196,0.08) 0%, transparent 70%); border-radius: 50%; }
#typed-letter { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.1rem,2.5vw,1.35rem); color: #2a1a16; line-height: 2.2; font-weight: 300; min-height: 300px; padding-left: 0; position: relative; z-index: 1; }
.letter-cursor { display: inline-block; width: 2px; height: 1.2em; background: var(--rose); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* STORY */
.story-item { display: grid; grid-template-columns: 80px 1fr; gap: 2rem; padding: 2.5rem; margin-bottom: 1.5rem; background: white; border-radius: 40px; opacity: 0; transform: translateY(30px); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 4px 16px rgba(166,77,111,0.08); }
.story-item.visible { opacity: 1; transform: translateY(0); }
.story-item:hover { box-shadow: 0 12px 40px rgba(166,77,111,0.15); transform: translateY(-6px); }
.story-num { font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 300; color: var(--rose); line-height: 1; text-align: right; padding-top: 0.2rem; }
.story-content h3 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.4rem,3vw,1.9rem); font-weight: 400; margin-bottom: 0.8rem; color: var(--deep); }
.story-content p { font-size: 1rem; line-height: 1.85; color: #2a1a16; font-weight: 300; }

/* TIMER */
#timer-section { background: var(--ink); color: var(--cream); padding: clamp(3rem,8vw,6rem) clamp(1.5rem,6vw,6rem); text-align: center; }
.timer-inner { max-width: 700px; margin: 0 auto; }
.timer-inner .section-label { color: var(--gold); justify-content: center; }
.timer-inner .section-label::after { display: none; }
.timer-inner .section-label::before { content: ''; flex: 1; height: 2px; background: linear-gradient(to left,var(--gold),transparent); border-radius: 10px; }
.timer-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.5rem,4vw,2.2rem); color: var(--cream); margin-bottom: 2.5rem; line-height: 1.3; font-weight: 300; }
.countdown-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
.cd-box { background: rgba(255,255,255,0.08); border: none; border-radius: 30px; padding: 1.5rem 0.5rem; position: relative; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
.cd-box::before { display: none; }
.cd-num { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,6vw,3.5rem); font-weight: 300; color: var(--cream); line-height: 1; }
.cd-unit { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-top: 0.5rem; opacity: 0.7; }
.timer-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: rgba(255,245,243,0.45); line-height: 1.7; }

/* TIMELINE */
#timeline { background: var(--cream); }
.timeline-track { position: relative; padding-left: 2rem; }
.timeline-track::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom,transparent,var(--rose),var(--rose),transparent); border-radius: 10px; }
.tl-item { display: flex; gap: 2rem; padding: 1.5rem 0 2.5rem 2rem; position: relative; opacity: 0; transform: translateX(-20px); transition: all 0.6s ease; }
.tl-item.visible { opacity: 1; transform: translateX(0); }
.tl-dot { position: absolute; left: -2.5rem; top: 1.8rem; width: 16px; height: 16px; border-radius: 50%; background: var(--rose); border: 3px solid var(--cream); box-shadow: 0 0 0 3px rgba(232,124,158,0.2); }
.tl-date { font-family: 'Cormorant Garamond', serif; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose); min-width: 100px; padding-top: 0.2rem; font-weight: 600; }
.tl-content h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--deep); margin-bottom: 0.3rem; }
.tl-content p { font-size: 0.9rem; color: #2a1a16; line-height: 1.7; font-weight: 300; }

/* LOVE */
#love { background: var(--ink); color: var(--cream); padding: clamp(4rem,10vw,8rem) clamp(1.5rem,6vw,6rem); }
.love-inner { max-width: 1100px; margin: 0 auto; }
.love-header { margin-bottom: 4rem; }
.love-header .section-label { color: var(--gold); }
.love-header h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,6vw,3.5rem); font-weight: 300; font-style: italic; color: var(--cream); line-height: 1.2; }
.love-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 1.5rem; }
.love-card { background: rgba(255,255,255,0.06); padding: 2rem; position: relative; overflow: hidden; opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
.love-card.visible { opacity: 1; transform: translateY(0); }
.love-card:hover { background: rgba(232,124,158,0.15); transform: translateY(-8px); box-shadow: 0 16px 48px rgba(232,124,158,0.2); }
.love-card::before { display: none; }
.love-num { font-family: 'Cormorant Garamond', serif; font-size: 0.8rem; letter-spacing: 0.3em; color: var(--gold); margin-bottom: 1rem; display: block; }
.love-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.2rem,2.5vw,1.5rem); font-weight: 300; color: var(--cream); line-height: 1.5; }
.love-sub { margin-top: 0.8rem; font-size: 0.85rem; color: rgba(255,245,243,0.45); line-height: 1.7; font-weight: 300; }

/* LOVE COUNTER */
#counter-section { background: var(--warm); padding: clamp(3rem,8vw,6rem) clamp(1.5rem,6vw,6rem); text-align: center; }
.counter-inner { max-width: 500px; margin: 0 auto; }
.counter-inner .section-label { justify-content: center; }
.counter-inner .section-label::after { display: none; }
.counter-inner .section-label::before { content: ''; flex: 1; height: 2px; background: linear-gradient(to left,var(--rose),transparent); border-radius: 10px; }
.counter-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.4rem,4vw,2rem); color: var(--deep); margin-bottom: 2rem; }
.counter-num { font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem,15vw,8rem); font-weight: 300; color: var(--rose); line-height: 1; transition: transform 0.1s; }
.counter-num.bump { transform: scale(1.08); }
.counter-sub { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose); margin-top: 0.5rem; margin-bottom: 2rem; font-weight: 600; }
.counter-btn { padding: 1rem 2.8rem; background: var(--deep); color: var(--cream); border: none; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 50px; font-weight: 600; box-shadow: 0 8px 24px rgba(166,77,111,0.2); }
.counter-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(166,77,111,0.3); }

/* GALLERY */
#gallery { background: var(--warm); padding: clamp(4rem,10vw,8rem) clamp(1.5rem,6vw,6rem); }
.gallery-inner { max-width: 1100px; margin: 0 auto; }
.gallery-coming-soon { text-align: center; padding: 5rem 2rem; border: none; border-radius: 45px; background: white; position: relative; overflow: hidden; box-shadow: 0 12px 48px rgba(166,77,111,0.1); }
.gallery-coming-soon::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%,rgba(232,124,158,0.08) 0%,transparent 70%); }
.gallery-cs-icon { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; animation: floatIcon 3s ease-in-out infinite; position: relative; z-index: 1; }
@keyframes floatIcon { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.gallery-cs-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,6vw,3.5rem); font-weight: 300; font-style: italic; color: var(--deep); margin-bottom: 1rem; position: relative; z-index: 1; }
.gallery-cs-sub { font-size: 0.95rem; color: #2a1a16; line-height: 1.8; max-width: 420px; margin: 0 auto 2rem; font-weight: 300; position: relative; z-index: 1; }
.gallery-cs-badge { display: inline-block; padding: 0.7rem 1.8rem; border: none; border-radius: 50px; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--cream); background: var(--rose); position: relative; z-index: 1; font-weight: 600; box-shadow: 0 4px 12px rgba(232,124,158,0.2); }

/* SPOTIFY */
#spotify-section { background: var(--ink); padding: clamp(3rem,8vw,6rem) clamp(1.5rem,6vw,6rem); }
.spotify-inner { max-width: 700px; margin: 0 auto; text-align: center; }
.spotify-inner .section-label { color: var(--gold); justify-content: center; }
.spotify-inner .section-label::after { display: none; }
.spotify-inner .section-label::before { content: ''; flex: 1; height: 2px; background: linear-gradient(to left,var(--gold),transparent); border-radius: 10px; }
.spotify-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.4rem,4vw,2rem); color: var(--cream); margin-bottom: 0.6rem; }
.spotify-sub { font-size: 0.85rem; color: rgba(255,245,243,0.45); margin-bottom: 2rem; }
.spotify-placeholder { background: rgba(255,255,255,0.08); border: none; border-radius: 30px; padding: 2.5rem; display: flex; align-items: center; gap: 1.5rem; text-align: left; }
.spotify-icon { width: 60px; height: 60px; background: #1DB954; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.8rem; }
.spotify-info h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--cream); margin-bottom: 0.3rem; }
.spotify-info p { font-size: 0.8rem; color: rgba(255,245,243,0.45); letter-spacing: 0.1em; }

/* VOWS */
#vows { background: var(--warm); }
.vows-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap: 2rem; }
.vow-card { background: white; border-radius: 40px; padding: 2.5rem 2rem; box-shadow: 0 8px 32px rgba(166,77,111,0.08); position: relative; overflow: hidden; opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
.vow-card.visible { opacity: 1; transform: translateY(0); }
.vow-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(166,77,111,0.15); }
.vow-card::before { display: none; }
.vow-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: var(--deep); margin-bottom: 1rem; font-style: italic; }
.vow-card p { font-size: 0.95rem; line-height: 1.8; color: #2a1a16; font-weight: 300; }

/* CHALLENGES */
#challenges { background: var(--cream); }
.challenge-item { display: flex; gap: 1.5rem; padding: 2rem; margin-bottom: 1.5rem; background: white; border-radius: 35px; align-items: flex-start; opacity: 0; transform: translateY(20px); transition: all 0.6s ease; box-shadow: 0 4px 16px rgba(166,77,111,0.08); }
.challenge-item.visible { opacity: 1; transform: translateY(0); }
.challenge-item:hover { box-shadow: 0 8px 32px rgba(166,77,111,0.12); transform: translateY(-3px); }
.challenge-icon { font-size: 1.8rem; width: 56px; height: 56px; background: var(--warm); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 12px rgba(166,77,111,0.1); }
.challenge-content h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; color: var(--deep); margin-bottom: 0.5rem; }
.challenge-content p { font-size: 0.95rem; line-height: 1.8; color: #2a1a16; font-weight: 300; }

/* NOTES */
#notes { background: var(--warm); }
.notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
@media(max-width:768px){.notes-grid{grid-template-columns:1fr;}}
.note-card { background: white; border-radius: 35px; padding: 2rem; box-shadow: 0 8px 32px rgba(166,77,111,0.08); opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
.note-card.visible { opacity: 1; transform: translateY(0); }
.note-card h3 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.4rem; color: var(--deep); margin-bottom: 0.4rem; }
.note-card .note-subtitle { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--rose); margin-bottom: 1.2rem; font-weight: 600; }
.note-card textarea { width: 100%; min-height: 160px; border: 1.5px solid #f0c4dd; border-radius: 25px; padding: 1.2rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; line-height: 1.6; color: #2a1a16; resize: vertical; transition: all 0.3s; }
.note-card textarea:focus { outline: none; border-color: var(--rose); box-shadow: 0 0 0 3px rgba(232,124,158,0.1); }
.note-card textarea::placeholder { color: #e8a7c4; font-style: italic; }

/* CLOSING */
#c
